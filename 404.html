<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA fallback: encode path into query string and redirect to root
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(l.pathname.indexOf('/', 1)) + l.search) +
        (l.hash || '')
      );
    </script>
  </head>
  <body></body>
</html>
